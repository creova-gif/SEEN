<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=428px, initial-scale=1.0"/>
<title>SEEN — Welcome</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
  * { font-family: 'Inter', sans-serif; }
  body { background: #000; display: flex; justify-content: center; min-height: 100vh; margin: 0; }
  #app { width: 428px; height: 926px; background: #000; position: relative; overflow: hidden; }
  .download-btn { position: fixed; top: 12px; right: 12px; z-index: 9999; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px 16px; border-radius: 20px; font-size: 12px; letter-spacing: 0.1em; cursor: pointer; backdrop-filter: blur(8px); }
  @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 40px rgba(255,255,255,0.06), 0 0 80px rgba(255,255,255,0.03); } 50% { box-shadow: 0 0 60px rgba(255,255,255,0.1), 0 0 120px rgba(255,255,255,0.05); } }
  .glow-ring { animation: pulse-glow 4s ease-in-out infinite; }
</style>
</head>
<body>
<button class="download-btn" onclick="downloadScreenshot('seen-onboarding')">↓ Download PNG</button>
<div id="app">
  <!-- Atmospheric background -->
  <div style="position:absolute;inset:0;background:radial-gradient(ellipse at 30% 20%, rgba(30,15,60,0.4) 0%, transparent 60%), radial-gradient(ellipse at 70% 80%, rgba(10,30,20,0.3) 0%, transparent 60%), #000;"></div>

  <!-- Floating ambient particles -->
  <div style="position:absolute;top:15%;left:20%;width:2px;height:2px;border-radius:50%;background:rgba(255,255,255,0.3);"></div>
  <div style="position:absolute;top:25%;right:25%;width:1px;height:1px;border-radius:50%;background:rgba(255,255,255,0.2);"></div>
  <div style="position:absolute;top:70%;left:15%;width:1.5px;height:1.5px;border-radius:50%;background:rgba(255,255,255,0.25);"></div>
  <div style="position:absolute;top:60%;right:20%;width:2px;height:2px;border-radius:50%;background:rgba(255,255,255,0.2);"></div>
  <div style="position:absolute;top:80%;left:60%;width:1px;height:1px;border-radius:50%;background:rgba(255,255,255,0.3);"></div>

  <!-- Language selector -->
  <div style="position:absolute;top:56px;left:0;right:0;display:flex;justify-content:center;gap:16px;z-index:10;">
    <button style="font-size:10px;letter-spacing:0.2em;color:white;text-transform:uppercase;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);padding:6px 14px;border-radius:20px;">EN</button>
    <button style="font-size:10px;letter-spacing:0.2em;color:rgba(255,255,255,0.4);text-transform:uppercase;background:transparent;border:1px solid rgba(255,255,255,0.08);padding:6px 14px;border-radius:20px;">FR</button>
    <button style="font-size:10px;letter-spacing:0.2em;color:rgba(255,255,255,0.4);text-transform:uppercase;background:transparent;border:1px solid rgba(255,255,255,0.08);padding:6px 14px;border-radius:20px;">ES</button>
  </div>

  <!-- Central SEEN logo with glow -->
  <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-55%);display:flex;flex-direction:column;align-items:center;z-index:10;">
    <!-- Outer glow ring -->
    <div class="glow-ring" style="width:180px;height:180px;border-radius:50%;border:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;margin-bottom:0;">
      <div style="width:140px;height:140px;border-radius:50%;border:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;">
        <div style="width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;">
          <svg width="36" height="36" fill="none" viewBox="0 0 24 24">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
            <circle cx="12" cy="12" r="3" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
          </svg>
        </div>
      </div>
    </div>

    <div style="margin-top:32px;text-align:center;">
      <h1 style="font-size:52px;font-weight:600;color:white;letter-spacing:0.12em;line-height:1;margin-bottom:6px;">SEEN</h1>
      <p style="font-size:11px;letter-spacing:0.35em;color:rgba(255,255,255,0.4);text-transform:uppercase;">BY CREOVA</p>
    </div>

    <p style="margin-top:20px;font-size:13px;color:rgba(255,255,255,0.5);text-align:center;max-width:260px;line-height:1.7;letter-spacing:0.02em;">Canadian stories from voices that shaped this land — and were never truly heard.</p>
  </div>

  <!-- Bottom CTA -->
  <div style="position:absolute;bottom:0;left:0;right:0;padding:0 28px 64px;display:flex;flex-direction:column;gap:12px;z-index:10;">
    <button style="width:100%;padding:16px;border-radius:16px;background:white;color:black;font-size:14px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;">
      Begin Your Journey
    </button>
    <button style="width:100%;padding:14px;border-radius:16px;background:transparent;border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.55);font-size:13px;letter-spacing:0.05em;">
      Continue as Guest
    </button>
    <p style="text-align:center;font-size:9px;color:rgba(255,255,255,0.25);letter-spacing:0.12em;text-transform:uppercase;margin-top:4px;">Compliant with PIPEDA · CMF Certified</p>
  </div>
</div>
<script>
async function downloadScreenshot(name) {
  const btn = document.querySelector('.download-btn');
  btn.textContent = 'Capturing…';
  const canvas = await html2canvas(document.getElementById('app'), { backgroundColor:'#000', scale:2, useCORS:true, logging:false });
  const link = document.createElement('a');
  link.download = name + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
  btn.textContent = '✓ Downloaded!';
  setTimeout(() => btn.textContent = '↓ Download PNG', 2000);
}
</script>
</body>
</html>
