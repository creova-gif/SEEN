<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Mobile-first: viewport-fit=cover unlocks safe-area insets (notch / Dynamic Island / home indicator) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <title>SEEN by Creova</title>
    <meta name="description" content="Canadian stories from voices that shaped this land — and were never truly heard." />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SEEN" />

    <!-- Prevent auto-formatting of phone numbers / emails -->
    <meta name="format-detection" content="telephone=no, email=no, address=no" />

    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <style>
      /* Desktop gate — invisible on mobile, full-screen overlay on desktop */
      #desktop-gate {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #000;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0;
      }
      #desktop-gate-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        max-width: 320px;
        text-align: center;
        padding: 40px 24px;
      }
      #desktop-gate-eye {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        border: 1px solid rgba(255,255,255,0.12);
        display: flex;
        align-items: center;
        justify-content: center;
        color: rgba(255,255,255,0.3);
        margin-bottom: 8px;
      }
      #desktop-gate-eye svg { width: 24px; height: 24px; }
      #desktop-gate-title {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 28px;
        font-weight: 600;
        letter-spacing: 0.12em;
        color: #fff;
        margin: 0;
      }
      #desktop-gate-sub {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 11px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.3);
        margin: -6px 0 0;
      }
      #desktop-gate-msg {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 14px;
        line-height: 1.6;
        color: rgba(255,255,255,0.45);
        margin: 8px 0 0;
      }
      #desktop-gate-pill {
        margin-top: 8px;
        padding: 6px 16px;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,0.1);
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 10px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.25);
      }
      @media (min-width: 768px) {
        #desktop-gate { display: flex; }
      }

      /* Safe-area: all fixed bottom navs automatically clear home indicator */
      nav[class*="fixed"][class*="bottom-0"] {
        padding-bottom: max(env(safe-area-inset-bottom), 0px);
      }
    </style>
  </head>

  <body>
    <!-- Desktop gate — hidden on mobile via CSS, shown on screens ≥ 768px -->
    <div id="desktop-gate" aria-hidden="true">
      <div id="desktop-gate-inner">
        <div id="desktop-gate-eye">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </div>
        <p id="desktop-gate-title">SEEN</p>
        <p id="desktop-gate-sub">by Creova</p>
        <p id="desktop-gate-msg">This app is designed for iOS &amp; Android.<br>Open it on your phone for the full experience.</p>
        <div id="desktop-gate-pill">Mobile only</div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
